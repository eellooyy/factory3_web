<div class="gf3-wrapper gf3-header-wrapper" style="padding-bottom: 0;">

            <div class="gf3-dropdown">

            </div>
        </div>
        
        <div class="gf3-controls">
            <div class="gf3-nav-group">
                <button id="gf3ContrastPrevBtn" class="gf3-icon-btn style-disabled" title="이전 날짜" disabled><span class="material-symbols-outlined">chevron_left</span></button>

                    <span id="gf3ContrastDateText" class="gf3-date-text cursor-pointer"></span>
                    <input type="text" id="gf3ContrastFlatpickr" style="display: none;">
                </div>
                
                <button id="gf3ContrastNextBtn" class="gf3-icon-btn style-disabled" title="다음 날짜" disabled><span class="material-symbols-outlined">chevron_right</span></button>
            </div>

            <button id="gf3ContrastEditBtn" class="gf3-action-btn edit-btn style-disabled" disabled>수정</button>
            <button id="gf3ContrastSaveBtn" class="gf3-action-btn save-btn style-disabled" disabled>저장</button>
