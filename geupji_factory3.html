<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3공장 급지 일지</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="geupji_factory3_style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
</head>
<body>
    <div class="gf3-wrapper">
        <header class="gf3-header">
            <span class="gf3-main-title">3공장 급지 일지</span>

            <div class="gf3-controls">
                <div class="gf3-nav-group">
                    <button id="gf3PrevBtn" class="gf3-icon-btn" title="이전 날짜" type="button">
                        <span class="material-symbols-outlined">chevron_left</span>
                    </button>
                    <div class="gf3-cal-wrap" id="gf3CalendarWrap">
                        <span id="gf3DateText" class="gf3-date-text"></span>
                        <input type="text" id="gf3Flatpickr" style="display: none;" aria-hidden="true" tabindex="-1">
                    </div>
                    <button id="gf3NextBtn" class="gf3-icon-btn" title="다음 날짜" type="button">
                        <span class="material-symbols-outlined">chevron_right</span>
                    </button>
                </div>

                <button id="gf3TodayBtn" class="gf3-action-btn today-btn" type="button">오늘</button>
                <button id="gf3EditBtn" class="gf3-action-btn edit-btn" type="button" disabled>수정</button>
                <button id="gf3SaveBtn" class="gf3-action-btn save-btn" type="button" disabled>저장</button>
                <button id="gf3ExcelBtn" class="gf3-action-btn excel-btn" type="button">
                    <span class="material-symbols-outlined" style="font-size: 16px; margin-right: 4px;">table_view</span>엑셀 출력
                </button>
            </div>
        </header>

        <div class="gf3-layout">
            <div class="gf3-main-table-box">
                <table class="gf3-table">
                    <thead>
                        <tr class="border-top-thick">
                            <th class="gf3-th row-title" style="text-align: center;">구분</th>
                            <th class="gf3-th">788</th>
                            <th class="gf3-th">R51</th>
                            <th class="gf3-th">R52</th>
                            <th class="gf3-th">R53</th>
                            <th class="gf3-th">R54</th>
                            <th class="gf3-th border-right-thick">R55</th>
                            <th class="gf3-th" colspan="2" style="text-align: center;">특집</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="gf3-td row-title fw-bold" style="text-align: center;">사용 전 잔량</td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="1" data-col="B" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="1" data-col="C" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="1" data-col="D" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="1" data-col="E" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="1" data-col="F" readonly></td>
                            <td class="gf3-td editable border-right-thick"><input type="text" class="gf3-input target-calc" data-row="1" data-col="G" readonly></td>
                            <td class="gf3-td editable" colspan="2"><input type="text" class="gf3-input" data-row="1" data-col="H" readonly placeholder="특집 메모"></td>
                        </tr>
                        <tr>
                            <td class="gf3-td row-title fw-bold" rowspan="6" style="text-align: center;">완 롤</td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="2" data-col="B" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="2" data-col="C" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="2" data-col="D" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="2" data-col="E" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="2" data-col="F" readonly></td>
                            <td class="gf3-td editable border-right-thick"><input type="text" class="gf3-input target-calc" data-row="2" data-col="G" readonly></td>
                            <td class="special-cell" colspan="2"></td>
                        </tr>
                        <tr>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="3" data-col="B" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="3" data-col="C" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="3" data-col="D" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="3" data-col="E" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="3" data-col="F" readonly></td>
                            <td class="gf3-td editable border-right-thick"><input type="text" class="gf3-input target-calc" data-row="3" data-col="G" readonly></td>
                            <td class="special-label">사용량 총계:</td>
                            <td class="gf3-td editable"><input type="text" id="statTotalUsage" class="gf3-input" readonly></td>
                        </tr>
                        <tr>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="4" data-col="B" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="4" data-col="C" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="4" data-col="D" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="4" data-col="E" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="4" data-col="F" readonly></td>
                            <td class="gf3-td editable border-right-thick"><input type="text" class="gf3-input target-calc" data-row="4" data-col="G" readonly></td>
                            <td class="special-label">실사용량:</td>
                            <td class="gf3-td readonly"><input type="text" id="statRealUsage" class="gf3-input" readonly></td>
                        </tr>
                        <tr>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="5" data-col="B" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="5" data-col="C" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="5" data-col="D" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="5" data-col="E" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="5" data-col="F" readonly></td>
                            <td class="gf3-td editable border-right-thick"><input type="text" class="gf3-input target-calc" data-row="5" data-col="G" readonly></td>
                            <td class="special-label">증감:</td>
                            <td class="gf3-td readonly"><input type="text" id="statDiff" class="gf3-input" readonly></td>
                        </tr>
                        <tr>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="6" data-col="B" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="6" data-col="C" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="6" data-col="D" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="6" data-col="E" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="6" data-col="F" readonly></td>
                            <td class="gf3-td editable border-right-thick"><input type="text" class="gf3-input target-calc" data-row="6" data-col="G" readonly></td>
                            <td class="special-cell" colspan="2"></td>
                        </tr>
                        <tr>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="7" data-col="B" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="7" data-col="C" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="7" data-col="D" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="7" data-col="E" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="7" data-col="F" readonly></td>
                            <td class="gf3-td editable border-right-thick"><input type="text" class="gf3-input target-calc" data-row="7" data-col="G" readonly></td>
                            <td class="special-cell bottom-border" colspan="2"></td>
                        </tr>
                        <tr class="calc-row">
                            <td class="gf3-td row-title fw-bold" style="text-align: center;">사용 전 합계</td>
                            <td class="gf3-td readonly"><input type="text" class="gf3-input" data-row="8" data-col="B" readonly></td>
                            <td class="gf3-td readonly"><input type="text" class="gf3-input" data-row="8" data-col="C" readonly></td>
                            <td class="gf3-td readonly"><input type="text" class="gf3-input" data-row="8" data-col="D" readonly></td>
                            <td class="gf3-td readonly"><input type="text" class="gf3-input" data-row="8" data-col="E" readonly></td>
                            <td class="gf3-td readonly"><input type="text" class="gf3-input" data-row="8" data-col="F" readonly></td>
                            <td class="gf3-td readonly border-right-thick"><input type="text" class="gf3-input" data-row="8" data-col="G" readonly></td>
                            <td class="special-label">사용량 A (1576mm):</td>
                            <td class="gf3-td readonly"><input type="text" id="statUsageA" class="gf3-input" readonly></td>
                        </tr>
                        <tr class="calc-row">
                            <td class="gf3-td row-title fw-bold" style="text-align: center;">사용량</td>
                            <td class="gf3-td readonly"><input type="text" class="gf3-input" data-row="9" data-col="B" readonly></td>
                            <td class="gf3-td readonly"><input type="text" class="gf3-input" data-row="9" data-col="C" readonly></td>
                            <td class="gf3-td readonly"><input type="text" class="gf3-input" data-row="9" data-col="D" readonly></td>
                            <td class="gf3-td readonly"><input type="text" class="gf3-input" data-row="9" data-col="E" readonly></td>
                            <td class="gf3-td readonly"><input type="text" class="gf3-input" data-row="9" data-col="F" readonly></td>
                            <td class="gf3-td readonly border-right-thick"><input type="text" class="gf3-input" data-row="9" data-col="G" readonly></td>
                            <td class="special-label">사용량 D (788mm):</td>
                            <td class="gf3-td readonly"><input type="text" id="statUsageD" class="gf3-input" readonly></td>
                        </tr>
                        <tr class="border-bottom-thick">
                            <td class="gf3-td row-title fw-bold" style="text-align: center;">사용 후 잔량</td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="10" data-col="B" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="10" data-col="C" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="10" data-col="D" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="10" data-col="E" readonly></td>
                            <td class="gf3-td editable"><input type="text" class="gf3-input target-calc" data-row="10" data-col="F" readonly></td>
                            <td class="gf3-td editable border-right-thick"><input type="text" class="gf3-input target-calc" data-row="10" data-col="G" readonly></td>
                            <td class="special-cell" colspan="2"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <aside class="gf3-side-panel">
                <div class="gf3-box">
                    <div class="gf3-box-header">완롤 잔량</div>
                    <table class="gf3-table mini-table">
                        <thead>
                            <tr>
                                <th class="gf3-th">A</th>
                                <th class="gf3-th">D</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="gf3-td editable"><input type="text" id="sideWanA" class="gf3-input" readonly></td>
                                <td class="gf3-td editable"><input type="text" id="sideWanD" class="gf3-input" readonly></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="gf3-box">
                    <div class="gf3-box-header">급지 재고</div>
                    <table class="gf3-table mini-table">
                        <thead>
                            <tr>
                                <th class="gf3-th">A</th>
                                <th class="gf3-th">D</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="gf3-td readonly"><input type="text" id="sideGeupA" class="gf3-input" readonly></td>
                                <td class="gf3-td readonly"><input type="text" id="sideGeupD" class="gf3-input" readonly></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="gf3-box">
                    <div class="gf3-box-header">급지 출고</div>
                    <table class="gf3-table mini-table">
                        <thead>
                            <tr>
                                <th class="gf3-th">A</th>
                                <th class="gf3-th">D</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="gf3-td readonly"><input type="text" id="sideChulgoA" class="gf3-input" readonly></td>
                                <td class="gf3-td readonly"><input type="text" id="sideChulgoD" class="gf3-input" readonly></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </aside>
        </div>
    </div>

    <script src="geupji_factory3_script.js"></script>
</body>
</html>
