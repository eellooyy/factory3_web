<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공장 일지 시스템 관리 포털</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .portal-container {
            text-align: center;
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 420px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 {
            font-size: 22px;
            color: #1d1d1f;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 32px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .portal-btn {
            display: block;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        .btn-f1 {
            background-color: #007AFF;
        }
        .btn-f1:hover {
            background-color: #0062cc;
            transform: translateY(-1px);
        }
        .btn-f3 {
            background-color: #217346;
        }
        .btn-f3:hover {
            background-color: #1a5c38;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <h1>공장 생산/관리 시스템</h1>
        <p>이동을 원하시는 공장의 일지를 선택하세요.</p>
        
        <div class="btn-group">
            <a href="factory1_ft.html" class="portal-btn btn-f1">1공장 FT 일지 바로가기</a>
            <a href="geupji_factory3.html" class="portal-btn btn-f3">3공장 급지 일지 바로가기</a>
        </div>
    </div>
</body>
</html>
