<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3공장 일지 - 입출고 대장</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link rel="stylesheet" href="css/factory3.css">
    <link rel="stylesheet" href="css/factory3_io_style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    
    <script src="js/common_ui.js" defer></script>
</head>
<body>

<div class="gf3-wrapper gf3-io-wrapper" data-page-module="Factory3IoModule">
    
    <div class="gf3-header">
        <div class="gf3-title-wrap">
            <span class="material-symbols-outlined gf3-hamburger">menu</span>
            <span class="gf3-main-title">3공장 입출고 대장</span>
            
            <div class="gf3-dropdown">
                <a href="geupji_factory3.html">3공장 일지</a>
                <a href="factory3_io.html" class="active">3공장 입출고 대장</a>
                <a href="factory3_contrast.html">3공장 실재고 및 ERP대조</a>
            </div>
        </div>
        
        <div class="gf3-controls">
            <div class="gf3-nav-group">
                <button id="gf3IoPrevBtn" class="gf3-icon-btn" title="이전 날짜"><span class="material-symbols-outlined">chevron_left</span></button>
                <div class="gf3-cal-wrap" id="gf3IoCalendarWrap">
                    <span id="gf3IoDateText" class="gf3-date-text cursor-pointer"></span>
                    <input type="text" id="gf3IoFlatpickr" style="display: none;">
                </div>
                <button id="gf3IoNextBtn" class="gf3-icon-btn" title="다음 날짜"><span class="material-symbols-outlined">chevron_right</span></button>
            </div>
            
            <button id="gf3IoTodayBtn" class="gf3-action-btn today-btn">오늘</button>
            <button id="gf3IoEditBtn" class="gf3-action-btn edit-btn" disabled>수정</button>
            <button id="gf3IoSaveBtn" class="gf3-action-btn save-btn" disabled>저장</button>
            <button id="gf3IoExcelBtn" class="gf3-action-btn excel-btn">
                <span class="material-symbols-outlined" style="font-size: 16px; margin-right: 4px;">table_view</span>엑셀 저장
            </button>
        </div>
    </div>

    <div class="gf3-layout">
        <div class="gf3-panels-outer">
            <div id="gf3Cursor" class="gf3-cursor"></div>

            <div class="gf3-panel gf3-panel-left">
                <div class="gf3-scroll-area" id="scrollAreaLeft">
                    <table class="gf3-table">
                        <thead class="gf3-thead-lv1">
                            <tr>
                                <th class="gf3-date-th" rowspan="2">날짜</th>
                                <th colspan="3">입출고 내역</th>
                            </tr>
                        </thead>
                        <thead class="gf3-thead-lv2">
                            <tr>
                                <th>입고</th>
                                <th>출고</th>
                                <th>재고</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyLeft">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="gf3-panel gf3-panel-mid">
                <div class="gf3-scroll-area" id="scrollAreaMid">
                    <table class="gf3-table">
                        <thead class="gf3-thead-lv1">
                            <tr>
                                <th class="gf3-date-th gf3-responsive-date" rowspan="2">날짜</th>
                                <th colspan="4">매체별 사용량</th>
                                <th class="gf3-sum-col" rowspan="2">매체 합계</th>
                            </tr>
                        </thead>
                        <thead class="gf3-thead-lv2">
                            <tr>
                                <th>매체 A</th>
                                <th>매체 B</th>
                                <th>매체 C</th>
                                <th>매체 D</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyMid">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="gf3-panel gf3-panel-right">
                <div class="gf3-scroll-area" id="scrollAreaRight">
                    <table class="gf3-table">
                        <thead class="gf3-thead-lv1">
                            <tr>
                                <th class="gf3-date-th gf3-responsive-date" rowspan="2">날짜</th>
                                <th>용지별 사용량</th>
                            </tr>
                        </thead>
                        <thead class="gf3-thead-lv2">
                            <tr>
                                <th class="gf3-sum-col">용지 합계</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyRight">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="js/factory3_utils.js"></script>
<script src="js/factory3_header.js"></script>
<script src="js/factory3_io_table_module.js"></script>
<script src="js/factory3_io_script.js"></script>
</body>
</html>
