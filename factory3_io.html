<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3공장 재고 종합</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link rel="stylesheet" href="css/factory3.css">
    <link rel="stylesheet" href="css/factory3_io.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    
    <script src="js/common_ui.js" defer></script>
</head>
<body style="background: #f4f4f8;">

<div class="gf3-wrapper" style="padding-bottom: 0;">
    <div class="gf3-header">
        <div class="gf3-title-wrap">
            <span class="material-symbols-outlined gf3-hamburger">menu</span>
            <span class="gf3-main-title">3공장 재고 종합</span>
            
            <!-- 마스터(비밀번호 0000) 전용 실시간 재고 동기화 버튼 -->
            <button id="gf3IoTitleSyncBtn" title="재고 재계산 및 DB 동기화" style="display: none; background: none; border: none; cursor: pointer; color: #1c1c1e; margin-left: 8px; padding: 4px; border-radius: 50%; align-items: center; justify-content: center; transition: background-color 0.2s; vertical-align: middle; outline: none;">
                <span class="material-symbols-outlined" style="font-size: 20px; font-weight: bold; display: block;">sync</span>
            </button>
            
            <div class="gf3-dropdown">
                <a href="factory3_ilji.html">3공장 일지</a>
                <a href="factory3_io.html" class="active">3공장 재고 종합</a>
                <div class="gf3-dropdown-item">
                    <span class="gf3-dropdown-label">
                        3공장 설비
                        <span class="material-symbols-outlined gf3-submenu-arrow">chevron_right</span>
                    </span>
                    <div class="gf3-submenu">
                        <a href="factory3_facility_comp.html">콤프레셔 가동</a>
                    </div>
                </div>
                <a href="https://eellooyy.github.io/factory1/" target="_blank">1공장으로 이동</a>
            </div>
        </div>
        
        <div class="gf3-controls">
            <div class="gf3-nav-group">
                <button id="gf3IoPrevBtn" class="gf3-icon-btn" title="이전 날짜"><span class="material-symbols-outlined">chevron_left</span></button>
                <div class="gf3-cal-wrap" id="gf3IoCalendarWrap">
                    <span id="gf3IoDateText" class="gf3-date-text cursor-pointer"></span>
                    <input type="text" id="gf3IoFlatpickr" style="display: none;">
                </div>
                <button id="gf3IoNextBtn" class="gf3-icon-btn" title="다음 날짜"><span class="material-symbols-outlined">chevron_right</span></button>
            </div>
            
            <button id="gf3IoTodayBtn" class="gf3-action-btn today-btn">오늘</button>
            <button id="gf3IoEditBtn" class="gf3-action-btn edit-btn" disabled>수정</button>
            <button id="gf3IoSaveBtn" class="gf3-action-btn save-btn" disabled>저장</button>
            <button id="gf3IoExcelBtn" class="gf3-action-btn excel-btn">
                <span class="material-symbols-outlined" style="font-size: 16px; margin-right: 4px;">table_view</span>엑셀 저장
            </button>
        </div>
    </div>
</div>

<div class="gf3-wrapper f3io-wrapper" data-page-module="Factory3IoModule" style="padding-top: 14px;">

    <!-- 1층: 3공장 입출고 대장 -->
    <div class="f3io-floor-container">
        <div class="panel-header-grid mb-3">
            <div class="header-left">
                <span class="panel-title">입출고 대장</span>
            </div>
            <div class="header-center text-center"></div>
            <div class="header-right d-flex align-items-center justify-content-end gap-2">
                <span class="small fw-bold text-dark me-1" style="font-size: 12px; font-weight: 700; color: #1d1d1f;">스크롤 ON/OFF</span>
                <label class="f1-toggle-switch" title="과거 DB 스크롤 ON/OFF">
                    <input type="checkbox" id="ioScrollToggle">
                    <span class="f1-toggle-slider"></span>
                </label>
            </div>
        </div>

        <div class="f3io-panels-outer">
            <div class="f3io-panel f3io-panel-left">
                <div class="f3io-scroll-area locked" id="f3ioScrollPanel1">
                    <div id="f3ioCursor1" class="f3io-cursor"></div>
                    <table class="f3io-table">
                        <thead>
                            <tr class="f3io-thead-lv1">
                                <th class="f3io-date-th" rowspan="2">날짜</th>
                                <th colspan="2" class="f3io-group-th" data-group="in">입고</th>
                                <th colspan="2" class="f3io-group-th f3io-sep" data-group="out">출고</th>
                                <th colspan="2" class="f3io-group-th f3io-sep" data-group="stock">재고</th>
                            </tr>
                            <tr class="f3io-thead-lv2">
                                <th class="f3io-leaf-th" data-col="1" data-parent-group="in">A</th>
                                <th class="f3io-leaf-th" data-col="2" data-parent-group="in">D</th>
                                <th class="f3io-leaf-th f3io-sep" data-col="3" data-parent-group="out">A</th>
                                <th class="f3io-leaf-th" data-col="4" data-parent-group="out">D</th>
                                <th class="f3io-leaf-th f3io-sep" data-col="5" data-parent-group="stock">A</th>
                                <th class="f3io-leaf-th" data-col="6" data-parent-group="stock">D</th>
                            </tr>
                        </thead>
                        <tbody id="f3ioBody1"></tbody>
                    </table>
                </div>
            </div>

            <div class="f3io-panel f3io-panel-mid">
                <div class="f3io-scroll-area locked" id="f3ioScrollPanel2">
                    <div id="f3ioCursor2" class="f3io-cursor"></div>
                    <table class="f3io-table">
                        <thead>
                            <tr class="f3io-thead-lv1">
                                <th class="f3io-date-th f3io-responsive-date" rowspan="2">날짜</th>
                                <th colspan="7" class="f3io-top-group-th">매체별 사용량</th>
                            </tr>
                            <tr class="f3io-thead-lv2">
                                <th class="f3io-leaf-th" data-col="1">본지</th>
                                <th class="f3io-leaf-th" data-col="2">별쇄</th>
                                <th class="f3io-leaf-th" data-col="3">경인일보</th>
                                <th class="f3io-leaf-th f3io-multiline-th" data-col="4">기독교<br>타임즈</th>
                                <th class="f3io-leaf-th" data-col="5">대학신문</th>
                                <th class="f3io-leaf-th" data-col="6">평화신문</th>
                                <th class="f3io-leaf-th f3io-sum-col" data-col="7">합계</th>
                            </tr>
                        </thead>
                        <tbody id="f3ioBody2"></tbody>
                    </table>
                </div>
            </div>

            <div class="f3io-panel f3io-panel-right">
                <div class="f3io-scroll-area locked" id="f3ioScrollPanel3">
                    <div id="f3ioCursor3" class="f3io-cursor"></div>
                    <table class="f3io-table">
                        <thead>
                            <tr class="f3io-thead-lv1">
                                <th class="f3io-date-th f3io-responsive-date" rowspan="2">날짜</th>
                                <th colspan="2" class="f3io-top-group-th">용지별 사용량</th>
                            </tr>
                            <tr class="f3io-thead-lv2">
                                <th class="f3io-leaf-th" data-col="1">A</th>
                                <th class="f3io-leaf-th" data-col="2">D</th>
                            </tr>
                        </thead>
                        <tbody id="f3ioBody3"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 2층: 실재고 및 ERP 대조 -->
    <div class="f3io-floor-container">
        <div class="panel-header-grid mb-3">
            <div class="header-left">
                <span class="panel-title">실재고 및 ERP 대조</span>
            </div>
            <div class="header-center text-center"></div>
            <div class="header-right d-flex align-items-center justify-content-end gap-2">
                <span class="small fw-bold text-dark me-1" style="font-size: 12px; font-weight: 700; color: #1d1d1f;">스크롤 ON/OFF</span>
                <label class="f1-toggle-switch" title="과거 DB 스크롤 ON/OFF">
                    <input type="checkbox" id="contrastScrollToggle">
                    <span class="f1-toggle-slider"></span>
                </label>
            </div>
        </div>

        <div class="f3ct-panels-outer">
            <div class="f3ct-panel f3ct-panel-1">
                <div class="f3ct-scroll-area locked" id="f3ctScrollPanel1">
                    <div id="f3ctCursor1" class="f3ct-cursor"></div>
                    <table class="f3ct-table">
                        <thead>
                            <tr class="f3ct-thead-lv1">
                                <th class="f3ct-date-th" rowspan="2">날짜</th>
                                <th colspan="3" class="f3ct-group-th">지고 재고</th>
                            </tr>
                            <tr class="f3ct-thead-lv2">
                                <th class="f3ct-leaf-th" data-col="1">A</th>
                                <th class="f3ct-leaf-th" data-col="2">D</th>
                                <th class="f3ct-leaf-th f3ct-sum-th" data-col="3">합계</th>
                            </tr>
                        </thead>
                        <tbody id="f3ctBody1"></tbody>
                    </table>
                </div>
            </div>

            <div class="f3ct-panel f3ct-panel-2">
                <div class="f3ct-scroll-area locked" id="f3ctScrollPanel2">
                    <div id="f3ctCursor2" class="f3ct-cursor"></div>
                    <table class="f3ct-table">
                        <thead>
                            <tr class="f3ct-thead-lv1">
                                <th colspan="3" class="f3ct-group-th">급지 재고</th>
                            </tr>
                            <tr class="f3ct-thead-lv2">
                                <th class="f3ct-leaf-th" data-col="1">A</th>
                                <th class="f3ct-leaf-th" data-col="2">D</th>
                                <th class="f3ct-leaf-th f3ct-sum-th" data-col="3">합계</th>
                            </tr>
                        </thead>
                        <tbody id="f3ctBody2"></tbody>
                    </table>
                </div>
            </div>

            <div class="f3ct-panel f3ct-panel-3">
                <div class="f3ct-scroll-area locked" id="f3ctScrollPanel3">
                    <div id="f3ctCursor3" class="f3ct-cursor"></div>
                    <table class="f3ct-table">
                        <thead>
                            <tr class="f3ct-thead-lv1">
                                <th colspan="3" class="f3ct-group-th">실재고</th>
                            </tr>
                            <tr class="f3ct-thead-lv2">
                                <th class="f3ct-leaf-th" data-col="1">A</th>
                                <th class="f3ct-leaf-th" data-col="2">D</th>
                                <th class="f3ct-leaf-th f3ct-sum-th" data-col="3">합계</th>
                            </tr>
                        </thead>
                        <tbody id="f3ctBody3"></tbody>
                    </table>
                </div>
            </div>

            <div class="f3ct-panel f3ct-panel-4">
                <div class="f3ct-scroll-area locked" id="f3ctScrollPanel4">
                    <div id="f3ctCursor4" class="f3ct-cursor"></div>
                    <table class="f3ct-table">
                        <thead>
                            <tr class="f3ct-thead-lv1">
                                <th colspan="3" class="f3ct-group-th">ERP 재고(수동)</th>
                            </tr>
                            <tr class="f3ct-thead-lv2">
                                <th class="f3ct-leaf-th" data-col="1">A</th>
                                <th class="f3ct-leaf-th" data-col="2">D</th>
                                <th class="f3ct-leaf-th f3ct-sum-th" data-col="3">합계</th>
                            </tr>
                        </thead>
                        <tbody id="f3ctBody4"></tbody>
                    </table>
                </div>
            </div>

            <div class="f3ct-panel f3ct-panel-5">
                <div class="f3ct-scroll-area locked" id="f3ctScrollPanel5">
                    <div id="f3ctCursor5" class="f3ct-cursor"></div>
                    <table class="f3ct-table">
                        <thead>
                            <tr class="f3ct-thead-lv1">
                                <th colspan="3" class="f3ct-group-th">실재고 - ERP 재고</th>
                            </tr>
                            <tr class="f3ct-thead-lv2">
                                <th class="f3ct-leaf-th" data-col="1">A</th>
                                <th class="f3ct-leaf-th" data-col="2">D</th>
                                <th class="f3ct-leaf-th f3ct-sum-th" data-col="3">합계</th>
                            </tr>
                        </thead>
                        <tbody id="f3ctBody5"></tbody>
                    </table>
                </div>
            </div>

            <div class="f3ct-panel f3ct-panel-6">
                <div class="f3ct-scroll-area locked" id="f3ctScrollPanel6">
                    <div id="f3ctCursor6" class="f3ct-cursor"></div>
                    <table class="f3ct-table">
                        <thead>
                            <tr class="f3ct-thead-lv1">
                                <th colspan="1" class="f3ct-group-th">증감</th>
                            </tr>
                            <tr class="f3ct-thead-lv2">
                                <th class="f3ct-leaf-th f3ct-sum-th" data-col="1">A+D 합계</th>
                            </tr>
                        </thead>
                        <tbody id="f3ctBody6"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</div>
